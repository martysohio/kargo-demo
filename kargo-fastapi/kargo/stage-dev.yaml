apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-demo
#should this ns match the kargo project? because kargo creates NS internally (at least on akuity)
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: fastapi

  promotionTemplate:
    spec:
      steps:
        - uses: git-clone

        - uses: kustomize-set-image
          config:
            path: kargo-fastapi/overlays/dev
            images:
              - image: ghcr.io/martysohio/fastapi-app
                tag: ${{ imageFrom("ghcr.io/martysohio/fastapi-app").Tag }}

        - uses: git-commit

        - uses: git-push