name: Build and Push FastAPI Image

on:
  push:
    branches:
      - main
    paths:
      - "images/fastapi-app/**"
      - ".github/workflows/build-fastapi.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: fastapi-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        run: |
          VERSION=$(cat images/fastapi-app/VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f images/fastapi-app/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${VERSION} \
            images/fastapi-app

      - name: Push image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${VERSION}