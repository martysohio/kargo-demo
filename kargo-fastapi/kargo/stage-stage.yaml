apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage
  namespace: kargo-fastapi

spec:
  requestedFreight:
    - origin:
        kind: Stage
        name: dev

  promotionTemplate:
    spec:
      steps:
        - uses: git-clone

        - uses: kustomize-set-image
          config:
            path: kargo-fastapi/overlays/stage
            images:
              - image: ghcr.io/martysohio/fastapi-app
                tag: ${{ imageFrom("ghcr.io/martysohio/fastapi-app").Tag }}

        - uses: git-commit

        - uses: git-push