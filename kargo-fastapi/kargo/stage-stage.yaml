apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: stage
  namespace: kargo-demo

spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: fastapi
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone

        - uses: kustomize-set-image
          config:
            path: kargo-fastapi/overlays/stage
            images:
              - image: ghcr.io/martysohio/fastapi-app
                tag: ${{ imageFrom("ghcr.io/martysohio/fastapi-app").Tag }}

        - uses: git-commit

        - uses: git-push