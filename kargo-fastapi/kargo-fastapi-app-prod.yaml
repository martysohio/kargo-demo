apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-fastapi-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/martysohio/kargo-demo.git
    targetRevision: main
    path: kargo-fastapi/overlays/prod

  destination:
    server: http://cluster-kargo-demo:8001
    namespace: prod-kargo-fastapi

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true